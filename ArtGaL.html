<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanisa's Art Work</title>
    <style>
        /* Base Reset and Fonts */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #f4f4f4;
            line-height: 1.6;
        }

        /* Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: rgba(18, 18, 18, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #d4af37; /* Elegant gold accent */
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #f4f4f4;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #d4af37;
        }

        /* Page Sections (for hiding/showing) */
        .page-section {
            min-height: calc(100vh - 80px);
            padding: 50px;
            display: none;
            animation: fadeIn 0.8s ease-in-out;
        }

        .active-section {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Home Section */
        #home-section {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1513364776144-60967b0f800f?q=80&w=2071&auto=format&fit=crop') no-repeat center center/cover;
        }

        .hero-content h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #d4af37;
        }

        .hero-content p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .cta-button {
            padding: 15px 30px;
            background-color: #d4af37;
            color: #121212;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .cta-button:hover {
            background-color: #b5952f;
            transform: scale(1.05);
        }

        /* Gallery Section */
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 10px;
        }

        .section-subtitle {
            text-align: center;
            margin-bottom: 40px;
            color: #aaa;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .art-card {
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #333;
        }

        .art-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .art-image {
            width: 100%;
            height: 250px;
            background-color: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-style: italic;
        }

        .art-info {
            padding: 20px;
        }

        .art-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .art-price {
            font-size: 1.1rem;
            color: #d4af37;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .buy-btn {
            width: 100%;
            padding: 10px;
            background-color: transparent;
            color: #f4f4f4;
            border: 1px solid #d4af37;
            cursor: pointer;
            transition: all 0.3s;
        }

        .buy-btn:hover {
            background-color: #d4af37;
            color: #121212;
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo">Fanisa's Art</div>
    <ul class="nav-links">
        <li><a href="#" id="nav-home" class="active">Home</a></li>
        <li><a href="#" id="nav-products">Products</a></li>
    </ul>
</nav>

<main>
    <section id="home-section" class="page-section active-section">
        <div class="hero-content">
            <h1>Welcome to Fanisa's Art Work</h1>
            <p>Discover a world of intricate sketches, fine arts, and emotive visual masterpieces. Every stroke tells a unique story.</p>
            <button id="explore-btn" class="cta-button">View the Gallery</button>
        </div>
    </section>

    <section id="products-section" class="page-section hidden-section">
        <h2 class="section-title">The Gallery</h2>
        <p class="section-subtitle">Explore our exclusive collection of original artworks.</p>
        <div id="gallery-container" class="gallery-grid">
        </div>
    </section>
</main>

<script>
    // 1. Array of Artworks (12 items)
    const artworks = [
        { id: 1, title: "Midnight Charcoal", price: "R 1,500", type: "Charcoal Sketch" },
        { id: 2, title: "Golden Hour Canvas", price: "R 3,200", type: "Oil on Canvas" },
        { id: 3, title: "Abstract Serenity", price: "R 2,800", type: "Acrylic Painting" },
        { id: 4, title: "Urban Whispers", price: "R 1,950", type: "Mixed Media" },
        { id: 5, title: "The Silent Ocean", price: "R 4,500", type: "Watercolor" },
        { id: 6, title: "Geometric Illusions", price: "R 2,100", type: "Digital Print" },
        { id: 7, title: "Monochrome Portrait", price: "R 1,800", type: "Pencil Sketch" },
        { id: 8, title: "Vibrant Chaos", price: "R 3,600", type: "Acrylic Painting" },
        { id: 9, title: "Nature's Embrace", price: "R 2,400", type: "Oil on Canvas" },
        { id: 10, title: "Forgotten Alleyway", price: "R 1,750", type: "Pen and Ink" },
        { id: 11, title: "Ethereal Dreams", price: "R 5,000", type: "Fine Art Sculpture" },
        { id: 12, title: "Sunset Silhouette", price: "R 2,250", type: "Pastel" }
    ];

    // 2. DOM Elements
    const navHome = document.getElementById('nav-home');
    const navProducts = document.getElementById('nav-products');
    const exploreBtn = document.getElementById('explore-btn');
    const homeSection = document.getElementById('home-section');
    const productsSection = document.getElementById('products-section');
    const galleryContainer = document.getElementById('gallery-container');

    // 3. Function to populate the gallery dynamically
    function loadGallery() {
        galleryContainer.innerHTML = ''; // Clear container first

        artworks.forEach(art => {
            // Create card element
            const card = document.createElement('div');
            card.className = 'art-card';

            // Add HTML inside the card
            card.innerHTML = `
                <div class="art-image">Image Placeholder<br>${art.type}</div>
                <div class="art-info">
                    <h3 class="art-title">${art.title}</h3>
                    <p class="art-price">${art.price}</p>
                    <button class="buy-btn">Inquire</button>
                </div>
            `;

            // Append to container
            galleryContainer.appendChild(card);
        });
    }

    // 4. Navigation Logic
    function switchSection(sectionToShow) {
        if (sectionToShow === 'home') {
            homeSection.style.display = 'flex';
            productsSection.style.display = 'none';
            navHome.classList.add('active');
            navProducts.classList.remove('active');
        } else if (sectionToShow === 'products') {
            homeSection.style.display = 'none';
            productsSection.style.display = 'block';
            navProducts.classList.add('active');
            navHome.classList.remove('active');
        }
    }

    // 5. Event Listeners
    navHome.addEventListener('click', (e) => {
        e.preventDefault();
        switchSection('home');
    });

    navProducts.addEventListener('click', (e) => {
        e.preventDefault();
        switchSection('products');
    });

    exploreBtn.addEventListener('click', () => {
        switchSection('products');
    });

    // 6. Initialize App
    document.addEventListener('DOMContentLoaded', () => {
        loadGallery(); // Load the artworks into the DOM
    });
</script>
</body>
</html>
